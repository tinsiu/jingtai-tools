name: 🤖 AI Tools Curator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: '每个源抓取的数量上限'
        required: false
        default: '20'

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml markdownify

      - name: 📁 Create output dir
        run: mkdir -p output

      - name: 🔍 Fetch GitHub Trending
        run: python scripts/fetch_github_trending.py ${{ github.event.inputs.limit || '20' }} | tee output/github_trending.md
        continue-on-error: true

      - name: 🚀 Fetch Product Hunt
        run: python scripts/fetch_producthunt.py ${{ github.event.inputs.limit || '15' }} | tee output/producthunt.md
        continue-on-error: true
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}

      - name: 📰 Fetch Hacker News
        run: python scripts/fetch_hackernews.py ${{ github.event.inputs.limit || '15' }} | tee output/hackernews.md
        continue-on-error: true

      - name: ⭐ Fetch awesome-* updates
        run: python scripts/fetch_awesome.py | tee output/awesome.md
        continue-on-error: true

      - name: 📝 Format digest
        run: python scripts/format_digest.py
        continue-on-error: true

      - name: 📧 Send email digest
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "[TOOL-FEED] AI Tools Daily — ${{ github.run_id }}"
          to: "tom@mildign.com"
          from: "AI Tools Curator <${{ secrets.SMTP_USER }}>"
          convert_markdown: true
          body: |
            🤖 AI 工具日报已生成！

            时间：${{ github.event.head_commit.timestamp }}
            运行 ID：${{ github.run_id }}
            查看完整内容：https://github.com/tinsiu/jingtai-tools/actions/runs/${{ github.run_id }}

            完整 digest 见附件 (digest.md)。
            GitHub Action 端只发摘要通知，完整内容由 ECS 端 fetch 后入库。
          attachments: output/digest.md
        if: always()
